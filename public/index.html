<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Página de Login -->
    <div id="pagina-login">
        <div class="login-box">
           <div class="icone">🏫</div>
            <h1>Sistema Escolar</h1>
            <p>Introduz as tuas credenciais para entrar</p>
            <input type="text" id="login-username" placeholder="Utilizador">
            <input type="password" id="login-senha" placeholder="Senha">
            <button onclick="fazerLogin()">Entrar</button>
            <p id="login-erro" class="erro"></p>
        </div>
    </div>

    <!-- Sistema Principal (escondido até fazer login) -->
    <div id="sistema" class="escondido">

        <header>
            <h1>🏫 Sistema de Gestão Escolar</h1>
            <div class="header-direita">
                <span id="nome-utilizador"></span>
                <button onclick="fazerLogout()" class="btn-logout">Sair</button>
            </div>
        </header>

        <nav>
            <button onclick="mostrarSecao('alunos')" class="ativo">Alunos</button>
            <button onclick="mostrarSecao('turmas')">Turmas</button>
            <button onclick="mostrarSecao('professores')">Professores</button>
            <button onclick="mostrarSecao('notas')">Notas</button>
        </nav>

        <main>

            <!-- Secção Alunos -->
            <section id="alunos">
                <h2>Alunos</h2>
                <div class="formulario">
                    <input type="text" id="aluno-nome" placeholder="Nome do aluno">
                    <input type="text" id="aluno-numero" placeholder="Número do aluno">
                    <button onclick="adicionarAluno()">Adicionar Aluno</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Número</th>
                            <th>Acção</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-alunos"></tbody>
                </table>
            </section>

            <!-- Secção Turmas -->
            <section id="turmas" class="escondido">
                <h2>Turmas</h2>
                <div class="formulario">
                    <input type="text" id="turma-nome" placeholder="Nome da turma">
                    <input type="text" id="turma-ano" placeholder="Ano">
                    <button onclick="adicionarTurma()">Adicionar Turma</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Ano</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-turmas"></tbody>
                </table>
            </section>

            <!-- Secção Professores -->
            <section id="professores" class="escondido">
                <h2>Professores</h2>
                <div class="formulario">
                    <input type="text" id="professor-nome" placeholder="Nome do professor">
                    <input type="text" id="professor-disciplina" placeholder="Disciplina">
                    <button onclick="adicionarProfessor()">Adicionar Professor</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Disciplina</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-professores"></tbody>
                </table>
            </section>

            <!-- Secção Notas -->
            <section id="notas" class="escondido">
                <h2>Notas</h2>
                <div class="formulario">
                    <input type="number" id="nota-aluno" placeholder="ID do aluno">
                    <input type="text" id="nota-disciplina" placeholder="Disciplina">
                    <input type="number" id="nota-valor" placeholder="Nota (0-20)" min="0" max="20">
                    <button onclick="adicionarNota()">Adicionar Nota</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Aluno ID</th>
                            <th>Disciplina</th>
                            <th>Nota</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-notas"></tbody>
                </table>
            </section>

        </main>
    </div>

    <script src="app.js"></script>

</body>
</html>
